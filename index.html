<!DOCTYPE html>
<html>
    <head>
        <title>Product Manger</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="app">
            <h1>Product Manger</h1>
        <p class="subtitle" >Manage Your Products using JavaScript and Local Storage</p>
        
        <div class="form-box">
            <input type="text" id="productName"  placeholder="ProductName">
            <input type="number" id="productPrice" placeholder="productPrice">
            <input type="number" id="productQuantity" placeholder="productQuantity">
            <button id="saveBtn">save product</button>
            <p id="message"></p>
        </div>

        <div class="list-box">
            <h2>Products</h2>

            <div id="productList"></div>
        </div>
      </div>

      <script src="script.js"></script>
    </body>
</html>
